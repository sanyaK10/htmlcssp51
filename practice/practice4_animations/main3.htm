<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            animation-name: text-appear;
            animation-duration: 1s;
            animation-fill-mode: forwards;
        }

        @keyframes text-appear {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .images {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-top: 40px;
            height: 300px;
        }

        .book, .calculator, .palete, .paper, .pencil {
            width: 50px;
            height: 50px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation-name: move-up;
            animation-duration: 2s;
            animation-fill-mode: forwards;
        }

        .book {
            background-image: url('./resources/book.png');
            animation-delay: 0s;
        }

        .calculator {
            background-image: url('./resources/calc.png');
            animation-delay: 0.5s;
        }

        .palete {
            background-image: url('./resources/pallete.png');
            animation-delay: 1s;
        }

        .paper {
            background-image: url('./resources/paper.png');
            animation-delay: 1.5s;
        }

        .pencil {
            background-image: url('./resources/pencil.png');
            animation-delay: 2s;
        }

        @keyframes move-up {
            from {
                transform: translateY(200px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body style="background-color: LemonChiffon;">
    <h1>HELLO, MY SITE!</h1>
    <div class="images">
        <div class="book"></div>
        <div class="calculator"></div>
        <div class="palete"></div>
        <div class="paper"></div>
        <div class="pencil"></div>
    </div>
</body>
</html>
