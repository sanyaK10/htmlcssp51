<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Table</title>

    <style>
        body{
            font-family: Arial, sans-serif;
        }

        div{
            max-width: 100%;
            max-height: 80vh;
            overflow: auto;
        }

        table{
            border-collapse: collapse;
            min-width: 900px;
        }

        th, td{
            padding: 15px 25px;
            text-align: center;
        }

        tr:first-child th{
            background-color: lightblue;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        tr td:first-child{
            background-color: lightblue;
            font-weight: bold;
            position: sticky;
            left: 0;
            z-index: 1;
        }

        tr:first-child th:first-child{
            left: 0;
            z-index: 3;
        }

        tr:nth-child(even) td:not(:first-child){
            background-color: #ececec;
        }

        tr:nth-child(odd) td:not(:first-child){
            background-color: #dddddd;
        }

        tr:last-child td{
            border-bottom: 2px solid gray;
        }
    </style>
</head>
<body>

<div>
