<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Годинник</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.clock{
    width:300px;
    height:300px;
    border:4px solid teal;
    border-radius:50%;
    position:relative;
}

.center{
    width:12px;
    height:12px;
    background:teal;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.hand{
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom center;
    background:teal;
}

.hour{
    width:5px;
    height:80px;
    animation:hourRotate 12s linear infinite;
}

.minute{
    width:3px;
    height:110px;
    animation:minuteRotate 4s linear infinite;
}

@keyframes hourRotate{
    from{
        transform:translateX(-50%) rotate(0deg);
    }
    to{
        transform:translateX(-50%) rotate(360deg);
    }
}

@keyframes minuteRotate{
    from{
        transform:translateX(-50%) rotate(0deg);
    }
    to{
        transform:translateX(-50%) rotate(360deg);
    }
}
</style>

</head>
<body>

<div class="clock">
    <div class="center"></div>
    <div class="hand hour"></div>
    <div class="hand minute"></div>
</div>

</body>
</html>
