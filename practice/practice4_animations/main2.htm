<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Жива іконка</title>

    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f3f3f3;
        }

        .box{
            position: relative;
            width: 220px;
            height: 220px;
        }

        .gray{
            position: absolute;
            width: 120px;
            left: 50px;
            top: 50px;
            transition: 0s;
        }

        .red{
            position: absolute;
            width: 220px;
            opacity: 0;
            transition: 5s;
        }

        .box:hover .red{
            opacity: 1;
        }

        .box:hover .gray{
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="box">

        <img src="./resources/1fa76webp.png" class="gray" alt="gray">
        <img src="./resources/favorites.png" class="red" alt="red">

    </div>

</body>
</html>
