<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="flex text-center justify-center relative top-5 rounded-lg">
        <div class="bg-blue-600">
            <p class="text-zinc-200 text-2xl">Your result</p>
            <div class="h-14 bg-linear-to-r from-blue-800 to-blue-600">
                <p class="text-white text-5xl  ">76</p>
                <p class="text-zinc-200">of 100</p>
            </div>
            <p class="text-white">Great</p>
            <p class="text-zinc-200">You scored higher than 65% of <br>the people who have taken <br> these tests.</p>
        </div>
        <div class="bg-white px-4 py-1">
            <p class="text-2xl">Summary</p>

            <div class="bg-red-100">
            <p class="text-red-600"> <img src="./results-summary-component-main/assets/images/icon-reaction.svg" alt=""> Reaction</p> <p>80 </p><p>/ 100</p>
            </div>

            <div class="bg-yellow-100">
            <p class="text-yellow-600"> <img src="./results-summary-component-main/assets/images/icon-memory.svg" alt=""> Memory</p><p>      92</p><p>/ 100</p>
            </div>

            <div class="bg-blue-100">
            <p><img src="./results-summary-component-main/assets/images/icon-visual.svg" alt=""> Visual</p> <p>     72 </p><p>/ 100</p>
            </div>

            <div class="bg-emerald-100">
            <p> <img src="./results-summary-component-main/assets/images/icon-verbal.svg" alt=""> Verbal</p> <p>     61 </p> <p>/ 100</p>
            </div>
            <button class="text-white bg-blue-600">Continue</button>
        </div>
    </div>
  </body>
</html>
