<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Results Summary Component</title>
  </head>
  <body class="flex items-center justify-center min-h-screen bg-slate-100 font-sans p-4">

    <div class="flex flex-col md:flex-row w-full max-w-[650px] bg-white rounded-[32px] shadow-2xl overflow-hidden">
        
        <div class="flex flex-col items-center justify-center p-10 bg-gradient-to-b from-indigo-500 to-blue-600 text-white md:w-1/2 rounded-[32px]">
            <h2 class="text-indigo-200 text-xl font-bold mb-8">Your Result</h2>
            
            <div class="w-40 h-40 flex flex-col items-center justify-center rounded-full bg-gradient-to-b from-indigo-800 to-indigo-600 mb-8">
                <span class="text-6xl font-bold">76</span>
                <span class="text-indigo-300 text-sm mt-1">of 100</span>
            </div>
            
            <p class="text-3xl font-bold mb-4">Great</p>
            <p class="text-indigo-200 text-center text-[15px] px-2 leading-tight">
                You scored higher than 65% of the people who have taken these tests.
            </p>
        </div>

        <div class="p-10 md:w-1/2 flex flex-col justify-between">
            <h2 class="text-xl font-bold mb-6 text-slate-800">Summary</h2>

            <div class="flex flex-col gap-4 mb-8">
                <div class="flex items-center justify-between p-4 rounded-xl bg-red-50/50">
                    <div class="flex items-center gap-3 text-red-500 font-bold">
                        <img src="./results-summary-component-main/assets/images/icon-reaction.svg" alt="" class="w-5 h-5">
                        <span>Reaction</span>
                    </div>
                    <div class="font-bold text-slate-800">
                        80 <span class="text-slate-400 font-medium ml-1">/ 100</span>
                    </div>
                </div>

                <div class="flex items-center justify-between p-4 rounded-xl bg-yellow-50/50">
                    <div class="flex items-center gap-3 text-yellow-500 font-bold">
                        <img src="./results-summary-component-main/assets/images/icon-memory.svg" alt="" class="w-5 h-5">
                        <span>Memory</span>
                    </div>
                    <div class="font-bold text-slate-800">
                        92 <span class="text-slate-400 font-medium ml-1">/ 100</span>
                    </div>
                </div>

                <div class="flex items-center justify-between p-4 rounded-xl bg-emerald-50/50">
                    <div class="flex items-center gap-3 text-emerald-500 font-bold">
                        <img src="./results-summary-component-main/assets/images/icon-verbal.svg" alt="" class="w-5 h-5">
                        <span>Verbal</span>
                    </div>
                    <div class="font-bold text-slate-800">
                        61 <span class="text-slate-400 font-medium ml-1">/ 100</span>
                    </div>
                </div>

                <div class="flex items-center justify-between p-4 rounded-xl bg-blue-50/50">
                    <div class="flex items-center gap-3 text-blue-600 font-bold">
                        <img src="./results-summary-component-main/assets/images/icon-visual.svg" alt="" class="w-5 h-5">
                        <span>Visual</span>
                    </div>
                    <div class="font-bold text-slate-800">
                        72 <span class="text-slate-400 font-medium ml-1">/ 100</span>
                    </div>
                </div>
            </div>

            <button class="w-full py-4 bg-slate-800 text-white rounded-full hover:bg-indigo-600 transition-colors font-bold text-lg cursor-pointer">
                Continue
            </button>
        </div>
    </div>

  </body>
</html>
