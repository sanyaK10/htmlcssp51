<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Прогрес-бар</title>

    <style>
        body{
            font-family: Arial;
            background: #f3f3f3;
        }

        .progress{
            width: 300px;
            height: 50px;
            border: 4px solid orange;
            margin: 100px auto;
            overflow: hidden;
            background: white;
        }

        .bar{
            width: 80px;
            height: 100%;
            background: orange;
            animation: move 2s linear infinite alternate;
        }

        @keyframes move{
            from{
                margin-left: 0;
            }

            to{
                margin-left: 220px;
            }
        }
    </style>
</head>
<body>

    <div class="progress">
        <div class="bar"></div>
    </div>

</body>
</html>
