<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Домашнє завдання 1 - Футер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .content {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        .footer {
            background-color: #2b547e;
            color: #ffffff;
            padding: 30px 0 20px 0;
        }

        .footer-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 0 20px;
        }

        .footer-menu {
            list-style: none;
        }

        .footer-menu li {
            margin-bottom: 8px;
        }

        .footer-menu a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .footer-menu a:hover {
            text-decoration: underline;
            color: #ffffff;
        }

        .social-icons {
            display: flex;
            gap: 15px;
        }

        .icon {
            display: inline-block;
            width: 40px;
            height: 40px;
            background-size: cover;
            background-position: center;
            transition: background-image 0.3s ease;
        }

        .facebook {
            background-image: url('./resources/fb.png');
        }

        .instagram {
            background-image: url('./resources/insta.png');
        }

        .youtube {
            background-image: url('./resources/youtube.png');
        }

        .facebook:hover {
            background-image: url('./resources/fb_gray.png');
        }

        .instagram:hover {
            background-image: url('./resources/insta_gray.png');
        }

        .youtube:hover {
            background-image: url('./resources/youtube_gray.png');
        }

        .footer-line {
            border: none;
            border-top: 1px solid #476b91;
            max-width: 900px;
            margin: 20px auto;
        }

        .copyright {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Ласкаво просимо на сайт!</h1>
        <p>Це домашнє завдання з верстки футера.</p>
    </div>

    <footer class="footer">
        <div class="footer-container">
            
            <ul class="footer-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">News</a></li>
            </ul>

            <ul class="footer-menu">
                <li><a href="#">Blog</a></li>
                <li><a href="#">FAQ</a></li>
                <li><a href="#">Contacts</a></li>
                <li><a href="#">Privacy & cookies</a></li>
            </ul>

            <div class="social-icons">
                <a href="#" class="icon facebook"></a>
                <a href="#" class="icon instagram"></a>
                <a href="#" class="icon youtube"></a>
            </div>

        </div>

        <hr class="footer-line">
        <p class="copyright">Copyright © Company 2018 - 2019</p>
    </footer>

</body>
</html>
