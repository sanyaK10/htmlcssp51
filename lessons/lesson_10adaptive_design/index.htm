<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentick</title>
    <style>
        *{
            margin:0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            background-color:antiquewhite
        }
        .container{
            width:100vw;
            min-width: 1200px;
            min-width:300px;
            min-height: 100vh;
            height:auto;
            display: flex;
            flex-direction: column;
        }
        header{
            display:flex;
            align-items: center;
            justify-content: center;
            color:cornsilk;
            background-color:darkblue;
            flex-basis:10vh;
        }
        main{
            flex-grow:11;
            display:flex;
            flex-shrink:auto;
        }
        aside:first-child, aside:last-child{
            display:flex;
            align-items: center;
            justify-content: center;
            flex-basis:20%;
        }
        aside:first-child{
            background-color:coral;
        }
        aside:last-child{
            background-color:darkmagenta;
        }
        main>section{
            display:flex;
            align-items: center;
            justify-content: center;
            flex-grow:11;
            flex-shrink:auto;
            background-color:grey;
        }
        footer{
            display:flex;
            align-items: center;
            justify-content: center;
            flex-basis:5vh;
            background-color:darkolivegreen;
            color:cornsilk;
            flex-basis:5vh;
        }
        @media screen and (max-width:960px) and (min-width:570px){
            aside:last-child{
                display:none;
            }
            aside:first-child{
                flex-basis:30%;
            }
            section{
                flex-basis:70%;
            } 
        }

        @media screen and (max-width:570px){
            aside{
                flex-basis:20vh;
            }
            main{
                flex-direction: column-reverse;
            }
             aside:last-child{
                display:none;
            }
            section{
                flex-basis:auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>
        <main>
            <aside>Left side</aside>
            <section>Middlen section</section>
            <aside>Right side</aside>
        </main>
           <footer>Footer</footer>
    </div>
</body>
</html>
