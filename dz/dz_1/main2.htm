<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Game</title>

    <style>

        body{
            background:#eeeeee;
            font-family:Arial;
        }

        .table{
            width:500px;
            background:#f5f5f5;
            margin:auto;
            padding:20px;
        }

        .card{
            background:#dddddd;
            padding:5px 10px;
            font-size:35px;
            margin-right:5px;
        }

        .red{
            color:darkred;
        }

    </style>

</head>
<body>

    <div class="table">

        <p>Player 1:</p>

        <b class="card">2♣</b>
        <b class="card red">9♥</b>
        <b class="card red">6♥</b>
        <b class="card red">A♦</b>
        <b class="card">Q♠</b>
        <b class="card">J♣</b>

        <p>Player 2:</p>

        <b class="card red">3♥</b>
        <b class="card">A♣</b>
        <b class="card">10♣</b>
        <b class="card red">K♦</b>
        <b class="card">8♠</b>
        <b class="card red">3♥</b>

    </div>

</body>
</html>
