<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 1</title>
    <style>
        body {
            background-color: #e9e9e9;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #87c3c0;
            width: 450px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header {
            background-color: #d96929;
            color: white;
            font-weight: bold;
            padding: 10px 15px;
            margin-left: -30px;
            margin-top: -10px;
            margin-bottom: 25px;
            display: inline-block;
            border-radius: 0 5px 5px 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #3b6b68;
            font-size: 13px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 3px;
            color: white;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #d1e5e4;
        }

        input:focus {
            outline: none;
            border-color: white;
        }

        .row {
            display: flex;
            justify-content: space-between;
        }

        .col {
            width: 45%;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            CREDIT CARD DETAILS
        </div>
        
        <form>
            <div class="form-group">
                <label>Card Number</label>
                <input type="text" placeholder="1234 5678 9012 3456">
            </div>

            <div class="form-group">
                <label>Name On Card</label>
                <input type="text" placeholder="Name Surname">
            </div>

            <div class="row">
                <div class="col form-group">
                    <label>Expire Date</label>
                    <input type="text" placeholder="02 / 2017">
                </div>
                <div class="col form-group">
                    <label>CSV No.</label>
                    <input type="password" placeholder="***">
                </div>
            </div>
        </form>
    </div>

</body>
</html>
