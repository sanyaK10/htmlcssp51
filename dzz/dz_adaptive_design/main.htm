<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Design Article</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #2b2b2b;
        }

        .article-container {
            background-color: #0c4b43;
            color: #ffffff;
            max-width: 800px;
            margin: 40px auto;
            padding: 50px;
            box-sizing: border-box;
        }

        .breadcrumb {
            color: #79a19d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 50px;
            line-height: 1.3;
        }

        .meta-footer {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            flex-shrink: 0;
            object-fit: cover;
        }

        .meta-info {
            display: flex;
            gap: 40px;
            width: 100%;
        }

        .meta-block {
            display: flex;
            flex-direction: column;
            font-size: 13px;
        }

        .meta-label {
            color: #79a19d;
            margin-bottom: 5px;
        }

        .meta-value {
            font-weight: bold;
        }
        @media (max-width: 600px) {
            .meta-footer {
                align-items: flex-start;
            }

            .meta-info {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }

            .meta-block-updated {
                grid-area: 1 / 1;
            }

            .meta-block-author {
                grid-area: 1 / 2;
            }

            .meta-block-comments {
                grid-area: 2 / 1;
            }

            .meta-block-published {
                grid-area: 2 / 2;
            }
        }
    </style>
</head>
<body>
    <div class="article-container">
        <div class="breadcrumb">Home / Articles /</div>
        
        <h1>The Difference Between<br>Responsive and<br>Adaptive Design</h1>
        
        <div class="meta-footer">
            <img src="./resources/account.png" class="avatar" alt="Author Avatar">
            
            <div class="meta-info">
                <div class="meta-block meta-block-author">
                    <span class="meta-label">Author</span>
                    <span class="meta-value">Geoff Graham</span>
                </div>
                <div class="meta-block meta-block-comments">
                    <span class="meta-label">49 Comments</span>
                    <span class="meta-value">Go to comments</span>
                </div>
                <div class="meta-block meta-block-published">
                    <span class="meta-label">Published</span>
                    <span class="meta-value">Nov 11, 2018</span>
                </div>
                <div class="meta-block meta-block-updated">
                    <span class="meta-label">Updated</span>
                    <span class="meta-value">Nov 17, 2018</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
