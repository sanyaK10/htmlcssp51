<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Fruits</title>
<style>
body{
    font-family: Arial, sans-serif;
}

.fruits{
    width: 500px;
    background:#f4a9b8;
    padding:20px;
}

.fruits li{
    background:#c96a83;
    color:white;
    margin:10px 0;
    padding:10px;
}

.fruits span{
    background:#a73d5a;
    padding:10px 20px;
}
</style>
</head>
<body>

<ol class="fruits">
    <li><span>Apple</span></li>
    <li><span>Orange</span></li>
    <li><span>Pineapple</span></li>
    <li><span>Pear</span></li>
    <li><span>Cherry</span></li>
</ol>

</body>
</html>
