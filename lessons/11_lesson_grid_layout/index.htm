<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            box-sizing:border-box;
        }
        .grid-container{
            width:80vw;
            background-color: cadetblue;
            padding:1.3em;
            display:grid;
            /* grid-template-columns: auto auto auto; */
            /* grid-template-columns: 200px 2fr 2em 3fr; */
            grid-template-columns: repeat(3, 1fr);
            /* grid-template-rows: 200px; */
            gap:5px;
        }
        .grid-container div:nth-child(4){
            grid-column:2/span 1;
            grid-row: 1/ span 2;
            /* grid-column-start: 2;
            grid-column-end: 4; */
            /* кінець виключно */
            /* grid-column: 2/span 2; */
        }
        .grid-container div{
            height:5vh;
            background-color: beige;
            border:black solid 1px;
            justify-content: center;
            align-items: center;
            display:flex;
        }
        .grid-area-example header{
            grid-area:header;
        }
        .grid-area-example aside:nth-of-type(1){
            grid-area:menu;
        }
        .grid-area-example main{
            grid-area:main;
        }
        .grid-area-example aside:nth-last-of-type(){
            grid-area:right;
        }
        .grid-area-example footer{
            grid-area:footer;
        }
        .grid-area-example main,aside,footer,header{
            display: flex;
            justify-content: center;
            align-items: center;
            border:black solid 1px;
            background-color: beige;
        }
        body{
            display:flex;
            justify-content: center;
        }
        .grid-area-example{
            width:80vw;
            min-height: 100vh;
            background-color: cadetblue;
            grid-template-rows:10vh auto 5vh;
            display:grid;

            grid-template-areas:
                'header header header header header header'
                'menu main main main main right'
                'menu footer footer footer footer footer'
        }
    </style>
</head>
<body>

    <!-- <div class="grid-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
    </div> -->

    <div class="grid-area-example">
        <header>Header</header>
        <aside>Menu</aside>
        <main>Main</main>
        <aside>Right</aside>
        <footer>Footer</footer>
    </div>
</body>
</html>
