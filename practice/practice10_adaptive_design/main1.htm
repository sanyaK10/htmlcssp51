<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      font-family: sans-serif;
    }

    .container {
      display: flex;
      flex-direction: row;
      gap: 10px;
      border: 1px solid black;
      padding: 10px;
    }

    .image {
      width: 150px;
      height: 100px;
      border: 1px solid gray;
      overflow: hidden;
    }

    .image img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    /* Це правило робить так, щоб картинка автоматично підлаштовувалась під рамку і не виходила за її межі. */


    .info {
      flex: 1;
    }

    .progress {
      width: 100%;
      background: #ddd;
      height: 20px;
      margin: 5px 0;
    }

    .progress-bar {
      width: 50%;
      height: 100%;
      background: green;
    }

    button {
      padding: 5px 10px;
    }
    @media (max-width: 600px) {
      .container {
        flex-direction: column;
      }

      .image {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image">
      <img src="./resources/loading.png" alt="">
    </div>
    <div class="info">
      <p>Назва відео: Мій ролик</p>
      <div class="progress">
        <div class="progress-bar"></div>
      </div>
      <p>Завантажено:50%</p>
    </div>
    <button>Готово</button>
  </div>
</body>
</html>
