<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма повідомлення</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('./image.png') no-repeat center center fixed;
            background-size: cover;
        }
        form {
            width: 60vw;
            max-width: 600px;
            margin: 5% auto;
            padding: 1.5em;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        label {
            font-weight: bold;
        }
        input, textarea, select, button {
            width: 100%;
            padding: 0.6em;
            margin-top: 0.4em;
            margin-bottom: 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <form action="">
        <div>
            <label for="fullname">Ім’я та прізвище:</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>
        <div>
            <label for="email">Поштова адреса:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="phone">Номер телефону:</label>
            <input type="tel" id="phone" name="phone" required>
        </div>
        <div>
            <label for="subject">Тема повідомлення:</label>
            <select id="subject" name="subject" required>
                <option value="">Оберіть тему</option>
                <option value="support">Підтримка</option>
                <option value="feedback">Відгук</option>
                <option value="other">Інше</option>
            </select>
        </div>
        <div>
            <label for="message">Текст повідомлення:</label>
            <textarea id="message" name="message" rows="6" required></textarea>
        </div>
        <div>
            <button type="submit">Надіслати</button>
            <button type="reset">Очистити</button>
        </div>
    </form>
</body>
</html>
