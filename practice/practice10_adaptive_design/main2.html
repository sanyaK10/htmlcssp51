<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практичне завдання 1 - Завдання 3</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #e5e5e5;
            display: flex;
            min-height: 100vh;
        }
        .aside-menu {
            background-color: #2f2f2f;
            width: 230px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 99;
        }
        .logo-area {
            padding: 20px;
            text-align: center;
            background-color: #222222;
        }
        .logo-area img {
            width: 50px;
        }
        .menu-links a {
            display: block;
            color: #b3b3b3;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid #3a3a3a;
        }
        .menu-links a.active, .menu-links a:hover {
            background-color: #3e3e3e;
            color: #ffffff;
        }
        .content-body {
            margin-left: 230px;
            padding: 25px;
            flex-grow: 1;
        }
        .content-body h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #333;
        }
        .widgets-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .block-card {
            background: #ffffff;
            flex: 1;
            padding: 15px;
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .block-card h3 {
            font-size: 13px;
            color: #666666;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .center-img {
            text-align: center;
        }
        .center-img img {
            max-width: 100%;
            height: 180px;
        }
        .table-responsive {
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            text-align: left;
            padding: 10px;
            border-bottom: 2px solid #dddddd;
            color: #222;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #eeeeee;
            color: #555555;
        }
        
        /* Адаптив для екранів менше 600px */
        @media (max-width: 600px) {
            body {
                flex-direction: column;
            }
            .aside-menu {
                position: static;
                width: 100%;
            }
            .content-body {
                margin-left: 0;
                padding: 15px;
            }
            .widgets-row {
                flex-direction: column;
            }
            .table-responsive {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

    <div class="aside-menu">
        <div class="logo-area">
            <img src="./resources/logo.png" alt="logo">
        </div>
        <div class="menu-links">
            <a href="#" class="active">DASHBOARD</a>
            <a href="#">USERS</a>
            <a href="#">FILE MANAGER</a>
            <a href="#">POSTS</a>
            <a href="#">EVENTS</a>
        </div>
    </div>

    <div class="content-body">
        <h2>Dashboard - May 25, 2019</h2>

        <div class="widgets-row">
            <div class="block-card">
                <h3>TRAFFIC</h3>
                <div class="center-img">
                    <img src="./resources/chart1.png" alt="chart">
                </div>
            </div>
            <div class="block-card">
                <h3>LOADS</h3>
                <div class="center-img">
                    <img src="./resources/chart2.png" alt="chart">
                </div>
            </div>
        </div>
